<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Bingo Jackpot</title>
  <desc id="desc">A jackpot style winner graphic with bright lights, stars, and coins.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#5a1a00"/>
      <stop offset="45%" stop-color="#2b0f00"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="40%" stop-color="#ffd34f"/>
      <stop offset="100%" stop-color="#cc8a00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <g opacity="0.25" stroke="#f59e0b" stroke-width="2">
    <line x1="600" y1="450" x2="600" y2="10"/>
    <line x1="600" y1="450" x2="1180" y2="140"/>
    <line x1="600" y1="450" x2="1120" y2="830"/>
    <line x1="600" y1="450" x2="80" y2="830"/>
    <line x1="600" y1="450" x2="20" y2="140"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="600" cy="420" r="260" fill="#1a1200" stroke="#fbbf24" stroke-width="10"/>
    <circle cx="600" cy="420" r="220" fill="#120c00" stroke="#f59e0b" stroke-width="5"/>
  </g>

  <text x="600" y="350" text-anchor="middle" fill="#fde68a" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="72" letter-spacing="10">BINGO</text>
  <text x="600" y="455" text-anchor="middle" fill="url(#gold)" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="140" letter-spacing="5">JACKPOT</text>
  <text x="600" y="535" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif" font-size="46">WE HAVE A WINNER!</text>

  <g fill="url(#gold)" stroke="#7c4700" stroke-width="4" opacity="0.95">
    <circle cx="270" cy="705" r="44"/>
    <circle cx="350" cy="760" r="34"/>
    <circle cx="960" cy="720" r="42"/>
    <circle cx="890" cy="780" r="30"/>
    <circle cx="1040" cy="790" r="25"/>
    <circle cx="150" cy="780" r="28"/>
  </g>

  <g fill="#fde68a" opacity="0.9">
    <polygon points="1040,170 1055,205 1094,209 1064,235 1073,273 1040,252 1007,273 1016,235 986,209 1025,205"/>
    <polygon points="185,220 198,250 231,253 206,275 213,307 185,289 157,307 164,275 139,253 172,250"/>
    <polygon points="600,100 610,125 636,127 616,144 622,169 600,156 578,169 584,144 564,127 590,125"/>
  </g>
</svg>
