<!-- Bingo Winner: exploding records starburst placeholder.
     Replace this file with a real asset — dimensions and filename stay the same. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-label="Bingo winner">
  <style>
    .burst { animation: burst 0.6s ease-out infinite alternate; transform-origin: 200px 200px; }
    .float1 { animation: float1 1.2s ease-in-out infinite alternate; }
    .float2 { animation: float2 1.4s ease-in-out infinite alternate; }
    .float3 { animation: float3 1.0s ease-in-out infinite alternate; }
    .float4 { animation: float4 1.6s ease-in-out infinite alternate; }
    .spin { animation: spin 3s linear infinite; }
    @keyframes burst { from { transform: scale(1); } to { transform: scale(1.06); } }
    @keyframes float1 { from { transform: translate(0,0) rotate(-15deg); } to { transform: translate(-6px,-10px) rotate(-25deg); } }
    @keyframes float2 { from { transform: translate(0,0) rotate(20deg); } to { transform: translate(8px,-8px) rotate(30deg); } }
    @keyframes float3 { from { transform: translate(0,0) rotate(-10deg); } to { transform: translate(-4px,8px) rotate(-20deg); } }
    @keyframes float4 { from { transform: translate(0,0) rotate(5deg); } to { transform: translate(6px,6px) rotate(15deg); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <!-- Starburst background -->
  <g class="burst">
    <polygon points="200,20 215,90 270,50 235,115 310,110 260,160 330,185 260,200 310,240 240,240 260,315 205,270 200,345 195,270 140,315 160,240 90,240 140,200 70,185 140,160 90,110 165,115 130,50 185,90" fill="#f59e0b" opacity="0.9"/>
    <polygon points="200,40 213,95 260,62 230,118 298,116 254,158 316,178 252,195 298,232 234,234 252,310 200,268 148,310 166,234 102,232 148,195 84,178 146,158 102,116 170,118 140,62 187,95" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Flying records -->
  <g class="float1" transform="translate(60,60)">
    <circle cx="0" cy="0" r="32" fill="#111" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#b45309"/>
    <circle cx="0" cy="0" r="2" fill="#0a0a0a"/>
  </g>
  <g class="float2" transform="translate(310,55)">
    <circle cx="0" cy="0" r="28" fill="#111" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="0" r="9" fill="#b45309"/>
    <circle cx="0" cy="0" r="2" fill="#0a0a0a"/>
  </g>
  <g class="float3" transform="translate(50,290)">
    <circle cx="0" cy="0" r="24" fill="#111" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#b45309"/>
    <circle cx="0" cy="0" r="2" fill="#0a0a0a"/>
  </g>
  <g class="float4" transform="translate(320,305)">
    <circle cx="0" cy="0" r="26" fill="#111" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#b45309"/>
    <circle cx="0" cy="0" r="2" fill="#0a0a0a"/>
  </g>

  <!-- Center spinning record -->
  <g style="transform-origin:200px 200px" class="spin">
    <circle cx="200" cy="200" r="70" fill="#111" stroke="#444" stroke-width="2"/>
    <circle cx="200" cy="200" r="62" fill="none" stroke="#222" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="52" fill="none" stroke="#222" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="42" fill="none" stroke="#222" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="28" fill="#d97706"/>
    <circle cx="200" cy="200" r="5" fill="#0a0a0a"/>
    <text x="200" y="197" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1a1a1a">BINGO!</text>
    <text x="200" y="208" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#1a1a1a">WINNER</text>
  </g>
</svg>
